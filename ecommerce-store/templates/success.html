{% extends "base.html" %}

{% block title %}Order Confirmed{% endblock %}

{% block content %}
<div class="success-page">
    <div class="success-card">
        <div class="success-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h1 class="success-title">Order Confirmed!</h1>
        <p class="success-message">Thank you for your purchase. Order #{{ order.id }} has been placed successfully.</p>
        <p class="success-total">Total: <strong>${{ (order.total_amount / 100) | round(2) }}</strong></p>
        <div class="success-actions">
            <a href="{{ url_for('orders') }}" class="btn btn-outline-primary">View Orders</a>
            <a href="{{ url_for('home') }}" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>
</div>
{% endblock %}
