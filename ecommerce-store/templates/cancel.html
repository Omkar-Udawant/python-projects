{% extends "base.html" %}

{% block title %}Payment Cancelled{% endblock %}

{% block content %}
<div class="cancel-page">
    <div class="cancel-card">
        <div class="cancel-icon">
            <i class="bi bi-x-circle"></i>
        </div>
        <h1 class="cancel-title">Payment Cancelled</h1>
        <p class="cancel-message">Your payment was not completed. Your cart items are still saved.</p>
        <div class="cancel-actions">
            <a href="{{ url_for('cart') }}" class="btn btn-primary">Back to Cart</a>
            <a href="{{ url_for('home') }}" class="btn btn-outline-primary">Continue Shopping</a>
        </div>
    </div>
</div>
{% endblock %}
